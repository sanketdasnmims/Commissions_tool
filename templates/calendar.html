{% extends "base.html" %}
{% block title_suffix %} — Calendar{% endblock %}
{% block page_title %}Calendar{% endblock %}
{% block nav_calendar %}nav-active{% endblock %}

{% block content %}
<div class="space-y-4">

  <!-- Month nav -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button onclick="prevMonth()" class="btn-ghost py-1.5 px-3 text-sm">← Prev</button>
      <h2 id="month-label" class="text-base font-semibold text-slate-700 w-36 text-center"></h2>
      <button onclick="nextMonth()" class="btn-ghost py-1.5 px-3 text-sm">Next →</button>
    </div>
    <div class="flex items-center gap-3" id="user-legend">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Calendar grid -->
  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden">
    <!-- Day headers -->
    <div class="grid grid-cols-7 border-b border-slate-100 dark:border-slate-700">
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Mon</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Tue</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Wed</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Thu</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Fri</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Sat</div>
      <div class="py-2.5 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">Sun</div>
    </div>
    <!-- Weeks -->
    <div id="cal-body" class="grid grid-cols-7">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Chore detail popup -->
  <div id="chore-popup" class="hidden fixed z-30 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl p-4 w-72"
    style="top:100px;left:100px">
    <div class="flex items-center justify-between mb-2">
      <span class="font-semibold text-sm" id="popup-title"></span>
      <button onclick="document.getElementById('chore-popup').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 text-lg leading-none">×</button>
    </div>
    <div id="popup-body" class="space-y-1.5 text-sm text-slate-600 dark:text-slate-400"></div>
    <div class="flex gap-2 mt-3">
      <button id="popup-complete" class="btn-primary text-xs py-1.5 px-3">Mark Done</button>
      <button id="popup-edit" class="btn-ghost text-xs py-1.5 px-3">Edit</button>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let calYear, calMonth, calEvents = [];

function initCal() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth(); // 0-indexed
}

async function loadCalendar() {
  calEvents = await apiFetch('/api/calendar-chores') || [];
  renderCalendar();
}

function renderCalendar() {
  const label = new Date(calYear, calMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  document.getElementById('month-label').textContent = label;

  // Build legend
  const legend = document.getElementById('user-legend');
  legend.innerHTML = _users.map(u => `
    <div class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full" style="background:${u.avatar_color}"></span>
      <span class="text-xs text-slate-500">${u.name}</span>
    </div>
  `).join('') + `
    <div class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-slate-400"></span>
      <span class="text-xs text-slate-500">Unassigned</span>
    </div>`;

  // First day of month (1=Mon offset)
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  // Monday-based: 0=Mon ... 6=Sun
  let startOffset = (firstDay.getDay() + 6) % 7;

  const today = new Date().toISOString().split('T')[0];
  const eventsThisMonth = {};

  calEvents.forEach(ev => {
    if (!eventsThisMonth[ev.date]) eventsThisMonth[ev.date] = [];
    eventsThisMonth[ev.date].push(ev);
  });

  const body = document.getElementById('cal-body');
  body.innerHTML = '';

  // Prev month fill
  for (let i = 0; i < startOffset; i++) {
    const d = new Date(calYear, calMonth, 1 - startOffset + i);
    body.appendChild(buildDay(d, true, eventsThisMonth, today));
  }

  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    body.appendChild(buildDay(date, false, eventsThisMonth, today));
  }

  // Next month fill to complete grid
  const total = startOffset + lastDay.getDate();
  const remainder = (7 - (total % 7)) % 7;
  for (let i = 1; i <= remainder; i++) {
    const d = new Date(calYear, calMonth + 1, i);
    body.appendChild(buildDay(d, true, eventsThisMonth, today));
  }
}

function buildDay(date, otherMonth, eventsMap, today) {
  const iso = date.toISOString().split('T')[0];
  const isToday = iso === today;
  const events = eventsMap[iso] || [];

  const cell = document.createElement('div');
  cell.className = `cal-day ${otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`;

  const numSpan = document.createElement('span');
  numSpan.className = 'cal-day-num';
  numSpan.textContent = date.getDate();
  cell.appendChild(numSpan);

  events.forEach(ev => {
    const pill = document.createElement('span');
    pill.className = 'cal-pill';
    const color = ev.assigned_user ? ev.assigned_user.avatar_color : '#94a3b8';
    pill.style.backgroundColor = color;
    pill.textContent = ev.title;
    pill.addEventListener('click', (e) => showChorePopup(ev, e));
    cell.appendChild(pill);
  });

  return cell;
}

function showChorePopup(ev, mouseEvent) {
  const popup = document.getElementById('chore-popup');
  document.getElementById('popup-title').textContent = ev.title;
  document.getElementById('popup-body').innerHTML = `
    <div>${catBadge(ev.category)} ${statusBadge(ev.status)}</div>
    <div>${userBadge(ev.assigned_user)}</div>
    <div class="text-xs text-slate-400">Due: ${formatDate(ev.date)}</div>
    <div class="text-xs text-slate-400">Effort: ${ev.estimated_effort} pts · Priority: ${ev.priority}</div>
  `;
  document.getElementById('popup-complete').onclick = async () => {
    const ok = await completeChore(ev.id);
    if (ok) { popup.classList.add('hidden'); loadCalendar(); showToast('Marked complete', 'success'); }
  };
  document.getElementById('popup-edit').onclick = () => {
    popup.classList.add('hidden');
    openChoreModal(ev.id);
  };

  // Position near click
  const x = Math.min(mouseEvent.clientX, window.innerWidth - 300);
  const y = Math.min(mouseEvent.clientY + 10, window.innerHeight - 220);
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.classList.remove('hidden');
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

document.addEventListener('click', e => {
  const popup = document.getElementById('chore-popup');
  if (!popup.contains(e.target) && !e.target.classList.contains('cal-pill')) {
    popup.classList.add('hidden');
  }
});

document.addEventListener('DOMContentLoaded', () => {
  initCal();
  loadCalendar();
});

window.onChoreModalSaved = loadCalendar;
</script>
{% endblock %}
